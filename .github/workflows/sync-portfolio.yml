name: Sync Portfolio Data

on:
  schedule:
    # Run every Sunday at 01:00 UTC (after stats update)
    - cron: "0 1 * * 0"
  push:
    branches: [main]
    paths:
      - ".github/scripts/sync_portfolio_data.py"
  workflow_dispatch:

jobs:
  sync-portfolio:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyGithub requests

      - name: Sync portfolio data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: negiadventures
        run: python .github/scripts/sync_portfolio_data.py

      - name: Commit projects.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects.json
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "chore: sync portfolio project data [skip ci]" && git push
