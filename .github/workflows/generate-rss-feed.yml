name: Generate RSS Feed

on:
  schedule:
    # Run every day at 06:00 UTC
    - cron: "0 6 * * *"
  push:
    branches: [main]
    paths:
      - ".github/scripts/generate_rss_feed.py"
      - "projects.json"
  workflow_dispatch:

jobs:
  generate-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyGithub requests

      - name: Generate RSS feed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: negiadventures
        run: python .github/scripts/generate_rss_feed.py

      - name: Commit feed.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "chore: regenerate RSS feed [skip ci]" && git push
